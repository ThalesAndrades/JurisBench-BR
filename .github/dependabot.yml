version: 2
updates:
  # pip: os limites do requirements.txt são mínimos folgados de propósito
  # (compatibilidade com Colab); só interessam correções de segurança.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencias"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencias"]
