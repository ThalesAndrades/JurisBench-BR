name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Instalar dependências de verificação
        run: pip install ruff pytest numpy
      - name: Lint (ruff)
        run: ruff check .
      - name: Testes de métricas
        run: pytest tests/ -q
